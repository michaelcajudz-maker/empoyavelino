<script> 

// UTILITIES
function shuffle(array) {
	let currentIndex = array.length,  randomIndex;
	while (currentIndex != 0) {
    	randomIndex = Math.floor(Math.random() * currentIndex);
    	currentIndex--;
		[array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
	}
	return array;
}

function loadTiles(divid,letterArr, boolPool){
	$("#"+divid).empty();
    var poolclass = boolPool ? "spnpool" : "spnholder" ; 
    var i=0;
    while(i < letterArr.length){
    	$("#"+divid).append(
        	"<span class='"+poolclass+" shadw' "+
            "onclick=\"tileClick("+boolPool+","+i+",'"+letterArr[i]+"')\">"+ 
            letterArr[i]+"</span>"
        );
        i++;
    }
}

function loadQstn(elemid,qstn){
	$("#"+elemid).empty();
    $("#"+elemid).text( qstn.toUpperCase() );
}

function showMsg(elemid,smsg,isInfo=true){
	smsg = smsg.toUpperCase();

	$("#"+elemid).text(smsg);

    $("#"+elemid).css("color",colr);
	if(msgTimer != null){
    	clearTimeout(msgTimer);
        msgTimer = null;
    } 
	msgTimer = setTimeout(function(){

}

function transferArrItem(arrSrc,indx,arrDest){
	var tval = arrSrc[indx];

	} else {

        	showMsg("dvmsg","Tama");
        } else {

    }
}

function checkBadwords(joinedstr){

function addHistory(){
	var h = getMaxHistory();
	if(previousItems.length >= h) previousItems.splice(0,1);
    previousItems.push(activeItem.ans);
}

function getRandomItem(){
	mainItems = shuffle(mainItems);
	var cnt = 0; 
	while(cnt < mainItems.length){
    	itm = mainItems[cnt];
    	if( previousItems.indexOf(itm.ans ) == -1 ) return itm;
        cnt++;
    }
}

// EVENTS
function tileClick(boolPool,indx,chr){

	if(boolPool) transferArrItem(poolLetters,indx,holderLetters); 
    else transferArrItem(holderLetters,indx,poolLetters);  
    
    loadTiles("divpool", poolLetters, true);
    loadTiles("divholder", holderLetters, false);
    
    checkAnswer();
}

function clearClick(){
	if(holderLetters.length <= 0) return ;

    var i = 0;
    while(i < holderLetters.length) transferArrItem(holderLetters,i,poolLetters);  
    
    loadTiles("divpool", poolLetters, true);
    loadTiles("divholder", holderLetters, false);
    
    checkAnswer();
}

function shuffleClick(){
	
	poolLetters = shuffle( poolLetters );
	loadTiles("divpool", poolLetters, true);
}

function clueClick(){
	
    var len = activeItem.ans.length;
	var msg = len >= 5 ? activeItem.ans.substr(0,3) : activeItem.ans.substr(0,2) ;
    alert("Naguumpisa sa '"+msg+"'");
}

function renderItem(){
	$("#btnShuffle").removeAttr("disabled" );
    $("#btnClear").attr("disabled","disabled");
	activeItem = getRandomItem() ;
	activeItem.ans = activeItem.ans.toUpperCase();
	poolLetters = shuffle( activeItem.ans.split("") );
	loadTiles("divpool", poolLetters, true);
    holderLetters = [];
    loadTiles("divholder", holderLetters, false);
    loadQstn("spnquestion",activeItem.qstn);
    addHistory();
}
