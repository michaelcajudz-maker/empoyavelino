<html>
<head> 
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
	<link rel="icon" type="image/png" href="/favicon.png" />
	<title>Empoy Avelino</title>
	<style type="text/css" >
		.center-container { display: flex; justify-content: center; align-items: center; height: 100vh; font-family:verdana; font-size:23px; }
	</style>
	<script>
	  // Fetch the exact same index.html file, but add a random timestamp to bypass the cache
	  fetch(window.location.href, { cache: 'no-store' })
	    .then(response => {
	      // Get the server's unique validator token for the newest file
	      const serverETag = response.headers.get('ETag');
	      const localETag = localStorage.getItem('site-version-etag');
	
	      if (serverETag && localETag && serverETag !== localETag) {
	        // If the server has a new ETag, save it and force a reload from the server
	        localStorage.setItem('site-version-etag', serverETag);
	        window.location.reload(true);
	      } else if (serverETag) {
	        localStorage.setItem('site-version-etag', serverETag);
	      }
	    })
	    .catch(err => console.log('Cache check skipped:', err));
	</script>
	<script src="script.js?v=2"></script> <!-- CHANGE VERSION HERE -->

</head>
	
<body>
	<div class="center-container">
	  <p>LOADING 🍺 </p>
	</div> 
</body> 
	
</html>
